<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=!, initial-scale=1.0">
    <title>Mascara de entrada</title>
</head>
<body style="padding: 30px 100px; font-family: Arial, Helvetica, sans-serif;">
    <h1>Máscara de Entrada</h1>
    <form method="">
        <label for="nome">Nome:</label><br>
        <input type="text" id="nome" required><br><br>
        <label type="cpf">CPF:</label><br>
        <input type="text" id="cpf" required><br><br>
        <label for="telefone">Telefone:</label><br>
        <input type="text" id="telefone" required><br><br>
        <label for="cep">CEP:</label><br>
        <input type="text" id="cep" required><br><br>
        <button type="submit">Enviar</button>

    </form>
    <h3 id="result"></h3>

    <script src="js/script.js"></script>
</body>
</html>
