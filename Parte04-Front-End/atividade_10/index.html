   <!-- conteúdo da página -->
    <main class="mt-5">
      <div class="container">
        <h1>Formulário bootstrap</h1>
        <hr>
        
        <!-- formulário -->
        <form>
        <div class="row">

          <div class="col-12 col-md-6 col-lg-4 mb-3">
            <label class="form-label">Primeiro nome:</label>
            <input class="form-control" type="text" placeholder="Informe o primeiro nome">
          </div>

          <div class="col-12 col-md-6 col-lg-4 mb-3">
            <label class="form-label">Sobrenome:</label>
            <input class="form-control" type="text" placeholder="Informe o sobrenome">
          </div>

          <div class="col-12 col-md-6 col-lg-4 mb-3">
            <label class="form-label">CPF:</label>
            <input class="form-control" type="text" placeholder="Informe o CPF">
          </div>

          <div class="col-12 col-md-6 col-lg-4 mb-3">
            <label class="form-label">Telefone:</label>
            <input class="form-control" type="tel" placeholder="(ddd) 9xxxx-xxxx">
          </div>

          <div class="col-12 col-md-6 col-lg-4 mb-3">
            <label class="form-label">Data de nascimento:</label>
            <input class="form-control" type="date">
          </div>

          <div class="col-12 col-md-6 col-lg-4 mb-3">
            <label class="form-label">Gênero:</label>
            <select class="form-select">
              <option selected>Escolha uma opção...</option>
              <option>Masculino</option>
              <option>Feminino</option>
              <option>Outro</option>
            </select>
          </div>

        </div>
        <div class="d-flex justify-content-center gap-3 mt-5">
          <button type="submit" class="btn btn-primary">Enviar</button>
          <button type="reset" class="btn btn-secondary">Limpar</button>
      </form>

      </div>
    </main>
    <!-- Scripts do Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
