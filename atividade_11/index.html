<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Calculadora IMC</title>
    <style>
    body{
        background: white;
        min-height: 100vh;
    }

    .glass-card{
        max-width: 400px;
        background: rgba(253, 253, 253, 0.15);
        backdrop-filter: blur(10px);
        color: white;
    }

    input{
        border-radius: 12px !important;
    }

    .btn-success{
        border-radius: 12px;
        font-weight: bold;
        transition: 0.3s;
    }

    .btn-success:hover{
        transform: scale(1.03);
    }

    footer{
        font-size: 14px;
    }
    </style>
     
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>
  <body>
    <!-- Cabeçalho -->
     <nav class="navbar navbar-expand-lg navbar-dark bg-success">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">
  <img src="img/calculadora-imc.png" alt="Logo" width="60" height="60">
</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarSupportedContent">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item">
          <a class="nav-link active" aria-current="page" href="#">Inicio</a>
        </li>
        <li class="nav-item">
        <a class="nav-link" href="#">Sobre IMC</a>
        </li>

        <li class="nav-item">
        <a class="nav-link" href="#">Contato</a>
        </li>
      </ul>
      
    </div>
  </div>
</nav>
     <!-- Fim do Cabeçalho -->

     <!-- Calculadora IMC em java -->

    <div class="container mt-5">

  <div class="card shadow-lg border-0 rounded-4 mx-auto p-4 glass-card">
    <h3 class="text-center mb-4">Calculadora de IMC</h3>

    <div class="mb-3">
      <input type="text" id="nome" class="form-control" placeholder="Seu nome">
    </div>

    <div class="mb-3">
      <input type="number" id="peso" class="form-control" placeholder="Peso (em kg)">
    </div>

    <div class="mb-3">
      <input type="number" id="altura" class="form-control" placeholder="Altura (em metros)">
    </div>

    <button onclick="calcularIMC()" class="btn btn-success w-100">
      Calcular
    </button>

    <p id="saida" class="mt-3 text-center fw-bold"></p>
  </div>

</div>
<!-- Fim da calculadora IMC -->

<footer class="bg-success text-white text-center py-3 fixed-bottom">
  <p class="mb-0">© 2026 Calculadora IMC - Todos os direitos reservados</p>
</footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="js/script.js"></script>
  </body>
</html>
